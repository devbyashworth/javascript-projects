<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebars</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <header>
        <button type="button">
          <span class="material-symbols-outlined"> menu </span>
          <img src="./logo.jpg" alt="company logo" />
        </button>
      </header>
      <nav class="menu">
        <button type="button">
          <span class="material-symbols-outlined">home</span>
          <p>Home</p>
        </button>
        <button type="button">
          <span class="material-symbols-outlined">overview</span>
          <p>Overview</p>
        </button>
        <button type="button">
          <span class="material-symbols-outlined">ratings</span>
          <p>Ratings</p>
        </button>
        <button type="button">
          <span class="material-symbols-outlined">products</span>
          <p>Products</p>
        </button>
        <button type="button">
          <span class="material-symbols-outlined">trends</span>
          <p>Trends</p>
        </button>
        <button type="button">
          <span class="material-symbols-outlined">inbox</span>
          <p>Inbox</p>
        </button>
        <button type="button">
          <span class="material-symbols-outlined">settings</span>
          <p>Settings</p>
        </button>
      </nav>
    </aside>
    <script src="./script.js"></script>
  </body>
</html>
