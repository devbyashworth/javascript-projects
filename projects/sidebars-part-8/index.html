<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebars</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside id="sidebar" class="sidebar">
      <div class="inner">
        <header>
          <button id="burger" class="sidebar-burger">
            <span class="material-symbols-outlined icon" id="burgerIcon"
              >menu</span
            >
          </button>
          <!-- <img src="./dev_by_ashworth.png" alt="logo" /> -->
          <img src="./text-logo-2.png" alt="logo" />
        </header>
        <nav>
          <button type="button">
            <span class="material-symbols-outlined icon">home</span>
            <p>Home</p>
          </button>
          <button type="button">
            <span class="material-symbols-outlined icon">build</span>
            <p>Build</p>
          </button>
          <button type="button">
            <span class="material-symbols-outlined icon">cloud</span>
            <p>Cloud</p>
          </button>
          <button type="button">
            <span class="material-symbols-outlined icon">finance_mode</span>
            <p>Stocks</p>
          </button>
          <button type="button">
            <span class="material-symbols-outlined icon">workspaces</span>
            <p>Workspaces</p>
          </button>
          <button type="button">
            <span class="material-symbols-outlined icon">mail</span>
            <p>Mail</p>
          </button>
          <button type="button">
            <span class="material-symbols-outlined icon">settings</span>
            <p>Settings</p>
          </button>
        </nav>
      </div>
    </aside>
    <script src="script.js"></script>
  </body>
</html>
