<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebars</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/akar-icons-fonts"></script>
  </head>
  <body>
    <aside class="sidebar">
      <div class="handle"></div>

      <div class="sidebar-inner">
        <header>
          <img src="" alt="" class="logo-icon" />
          <img src="" alt="" class="logo-text" />
        </header>

        <ul>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-home"></i>
              <p>Dashboard</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-grid"></i>
              <p>Apps</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-file"></i>
              <p>Files</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-person"></i>
              <p>Accounts</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-people-group"></i>
              <p>Users</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-location"></i>
              <p>Locations</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-bell"></i>
              <p>Notifications</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-shipping-box-v2"></i>
              <p>Products</p>
            </button>
          </li>
          <li>
            <button onclick="gotoPage(this)">
              <i class="ai-gear"></i>
              <p>Settings</p>
            </button>
          </li>
        </ul>
      </div>
    </aside>
    <script src="script.js"></script>
  </body>
</html>
