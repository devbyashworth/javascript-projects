<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logins / Register</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <!-- Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="walking-bg">
      <div class="walker walker1">
        <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png" />
      </div>

      <div class="walker walker2">
        <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png" />
      </div>

      <div class="walker walker3">
        <img src="https://cdn-icons-png.flaticon.com/512/1946/1946429.png" />
      </div>
    </div>
    <div class="card">
      <div class="card-bg"></div>
      <div class="hero register active">
        <h2>Welcome Back</h2>
        <p>Login to review your latest profit from investments.</p>
        <button type="button" onclick="toggleView()">LOGIN</button>
      </div>
      <div class="form register active">
        <h2>Sign Up</h2>
        <form action="#">
          <input type="text" placeholder="Full Name" required />

          <input type="email" placeholder="Email Address" required />

          <input type="password" placeholder="Create Password" required />

          <button type="submit" class="btn">Sign Up</button>
        </form>
      </div>
      <div class="hero login">
        <h2>Hello there</h2>
        <p>Begin your journey using this software, and start earning now.</p>
        <button type="button" onclick="toggleView()">Sign Up</button>
      </div>
      <div class="form login">
        <h2>Login</h2>
        <form action="#">
          <input type="email" placeholder="Email or Username" required />

          <input type="password" placeholder="Password" required />

          <p><a href="#">Forgot Password?</a></p>

          <button type="submit" class="btn">Sign In</button>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
